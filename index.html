<!DOCTYPE html>
<html>
<head>
<title>Guess The Number</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI, Arial;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#667eea,#764ba2);
}

.phone{
width:320px;
height:520px;
background:white;
border-radius:30px;
box-shadow:0 20px 40px rgba(0,0,0,0.3);
padding:30px;
text-align:center;
display:flex;
flex-direction:column;
justify-content:center;
position:relative;
}

h1{
margin-bottom:10px;
color:#333;
}

p{
color:#666;
margin-bottom:20px;
}

input{
padding:12px;
border-radius:12px;
border:1px solid #ddd;
width:100%;
margin-bottom:15px;
font-size:16px;
}

button{
padding:12px;
border:none;
border-radius:12px;
background:#667eea;
color:white;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#5563d6;
}

#result{
margin-top:15px;
font-size:18px;
font-weight:bold;
}

/* Win Popup */

.winPopup{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
display:flex;
justify-content:center;
align-items:center;
border-radius:30px;
display:none;
}

.winBox{
background:white;
padding:25px;
border-radius:20px;
text-align:center;
}

.winBox h2{
color:#2ecc71;
margin-bottom:15px;
}

</style>
</head>

<body>

<div class="phone">

<h1>Guess Game</h1>
<p>Guess a number between 1 and 100</p>

<input type="number" id="guess" placeholder="Enter your number">

<button onclick="check()">Submit Guess</button>

<div id="result"></div>

<!-- Win Popup -->
<div class="winPopup" id="winPopup">

<div class="winBox">
<h2>🎉 You Win!</h2>
<p>Correct Number!</p>
<button onclick="restart()">Play Again</button>
</div>

</div>

</div>

<script>

let number = Math.floor(Math.random()*100)+1;

function check(){

let guess = document.getElementById("guess").value;

if(guess < number){
document.getElementById("result").innerHTML="⬇ Too Low!";
}
else if(guess > number){
document.getElementById("result").innerHTML="⬆ Too High!";
}
else{
document.getElementById("winPopup").style.display="flex";
}

}

function restart(){

number = Math.floor(Math.random()*100)+1;
document.getElementById("winPopup").style.display="none";
document.getElementById("result").innerHTML="";
document.getElementById("guess").value="";

}

</script>

</body>
</html>
